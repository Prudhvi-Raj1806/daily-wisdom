name: Daily Quote Update

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows manual execution

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout daily-wisdom repository
        uses: actions/checkout@v4
        with:
          path: daily-wisdom

      - name: Checkout profile repository
        uses: actions/checkout@v4
        with:
          repository: Prudhvi-Raj1806/Prudhvi-Raj1806 # Replace with your GitHub username if different
          token: ${{ secrets.PROFILE_PAT }} # Requires a Personal Access Token with repo scope
          path: profile-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate new SVG
        run: |
          cd daily-wisdom
          python update.py

      - name: Copy SVG and commit to profile repo
        run: |
          # Copy generated SVG to profile repository
          mkdir -p profile-repo/assets
          cp daily-wisdom/assets/daily-wisdom.svg profile-repo/assets/
          
          # Commit and push changes
          cd profile-repo
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/daily-wisdom.svg
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update daily wisdom banner"
            git push
          fi
